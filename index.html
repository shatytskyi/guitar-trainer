<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Guitar Trainer</title>
    <link rel="icon" type="image/svg+xml" href="/guitar-trainer/favicon.svg" />
    <link rel="apple-touch-icon" href="/guitar-trainer/apple-touch-icon.png" />
    <link rel="manifest" href="/guitar-trainer/manifest.webmanifest" />
    <meta name="theme-color" content="#e9e4d2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Guitar Trainer" />
    <meta name="application-name" content="Guitar Trainer" />
    <meta name="description" content="Mobile-first guitar chord trainer. Pick a root, see the diagram, hear the chord. Works offline." />
    <script>
      // Apply persisted theme before CSS parses to avoid a flash of the wrong theme.
      try {
        var s = JSON.parse(localStorage.getItem('guitar-trainer.settings.v1') || '{}');
        if (s && (s.theme === 'paper' || s.theme === 'stage')) {
          document.documentElement.dataset.theme = s.theme;
        }
      } catch (_) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
